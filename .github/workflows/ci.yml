name: CI - Verificacao de Qualidade PHP

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando o codigo
      uses: actions/checkout@v3

    - name: Configurando o PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Validar Sintaxe do PHP (Lint)
      run: find . -name "*.php" -print0 | xargs -0 -n1 php -l